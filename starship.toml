# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true 

[directory]
style = 'bold blue'
truncation_length = 5
truncate_to_repo = false # Show full path in a repo

[shell]
# disabled = false

# Disable the package module, hiding it from the prompt completely
[package]
format = 'is [$version]($style) '

[python]
format = 'via [${symbol}${py_target}\($virtualenv\)]($style) '

[custom.hpc_python]
description = "Show loaded Python module from HPC environment"
# This command extracts just the python module (e.g., python/3.10.2) from the LOADEDMODULES list
command = "echo $LOADEDMODULES | grep -o -E 'python/[^:]*' | head -n 1"
# Only run and show this if 'python/' is actually inside the LOADEDMODULES variable
when = "echo $LOADEDMODULES | grep -q 'python/'"
# Format it similarly to the default Python module
format = "via [🐍 $output ]($style)"
style = "yellow bold"

[cmd_duration]
disabled = true

[lua]
disabled = true

[pixi]
format = ' [$symbol(\($environment\) )]($style)'
detect_folders = []
